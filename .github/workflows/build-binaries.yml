name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package release archive
        id: package
        run: |
          artifact_root="smtp2cf-x86_64-unknown-linux-gnu"
          mkdir -p "dist/${artifact_root}"
          cp target/release/smtp2cf "dist/${artifact_root}/"
          cp README.md LICENSE config.example.toml "dist/${artifact_root}/"
          cp systemd/smtp2cf.service "dist/${artifact_root}/"
          tar -C dist -czf "dist/${artifact_root}.tar.gz" "${artifact_root}"
          echo "archive=dist/${artifact_root}.tar.gz" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: smtp2cf-x86_64-unknown-linux-gnu
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

      - name: Attach archive to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
